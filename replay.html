<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minogoe - Replay</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <span id="onlineCount" class="online-count">&nbsp;</span>
    <a href="index.html"><img src="Minogoe.png" alt="Minogoe" class="logo"></a>
    <div id="authWidget" class="auth-widget"></div>
  </header>
  <nav class="site-nav">
    <a href="index.html">Play</a>
    <a href="profile.html">Profile</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>

  <div class="replay-page">
    <div id="replayMeta" class="replay-meta">Loading...</div>
    <canvas id="board"></canvas>
    <div class="replay-controls">
      <button id="restartBtn">Restart</button>
      <button id="stepBackBtn">&laquo; Step</button>
      <button id="playBtn">Play</button>
      <button id="stepFwdBtn">Step &raquo;</button>
    </div>
    <div id="stepInfo" class="step-info">Move 0 / 0</div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="auth-ui.js"></script>
<script src="presence.js"></script>
<script src="replay.js"></script>
</body>
</html>
